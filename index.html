<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巧虎大型舞台劇票房分析儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* =====================================================
   Dashboard Design System
   Theme: Pastel Sky / Style: standard / Mode: light
   Card Accent: none

   使用方式:
     請在儀表板的根元素加上 class="ds-root"。
     所有樣式僅作用於此 scope 內。

     <div class="ds-root">
       <div class="dashboard-container">
         ... 儀表板的 HTML 結構 ...
       </div>
     </div>
   ===================================================== */

/* 1. Design Tokens — 全域變數 (未被引用時不影響任何元素) */
:root {
  /* Brand color scale */
  --color-main-50:  #f1fafe;
  --color-main-100: #e3f4fd;
  --color-main-200: #c1e8fa;
  --color-main-300: #97d8f7;
  --color-main-400: #56c6fb;
  --color-main-500: #1ab1fa;
  --color-main-600: #059de5;
  --color-main-700: #0482bd;
  --color-main-800: #0d5c81;
  --color-main-900: #093b53;
  --color-main: #7dd3fc;
  --color-chart: #058fd1;   /* 已限制可視度的圖表用強調色 */

  /* Semantic */
  --color-bg: #f0f9ff;
  --color-card: #ffffff;
  --color-text: #0c4a6e;
  --color-muted: #7c93a8;
  --color-border: #dbeafe;
  --color-positive: #86efac;
  --color-negative: #fca5a5;
  --color-warning: #fcd34d;

  /* Fonts */
  --font-family: Inter, "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-heading-family: var(--font-family);
  --font-heading-weight: 600;

  /* Text sizes (per element) */
  --fs-base:         16px;
  /* 全局放大120% */
  --fs-scale: 1.2;
  --fs-title:        36px;
  --fs-subtitle:     12px;
  --fs-card-title:   20px;
  --fs-kpi-label:    12px;
  --fs-kpi-value:    37px;
  --fs-kpi-unit:     12px;
  --fs-kpi-delta:    12px;
  --fs-chart-title:  20px;
  --fs-chart-text:   9px;
  --fs-chart-legend: 12px;
  --fs-table-head:   12px;
  --fs-table-body:   16px;

  /* Layout */
  --radius: 8px;
  --max-width: 1200px;

  /* Spacing (density: cozy) */
  --space-xs: 6px;
  --space-sm: 12px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --row-pad: 12px;

  /* Effects */
  --shadow-card: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
  --card-backdrop: none;
}

/* 2. Shell — 僅作用於 .ds-root 與其後代的基礎樣式 */
.ds-root {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-family);
  font-size: calc(var(--fs-base) * 1.2);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}
.ds-root *,
.ds-root *::before,
.ds-root *::after { box-sizing: border-box; }
.ds-root h1,
.ds-root h2,
.ds-root h3,
.ds-root h4 {
  margin: 0;
  font-family: var(--font-heading-family);
  font-weight: var(--font-heading-weight);
}
.ds-root p { margin: 0; }
.ds-root table { border-collapse: collapse; width: 100%; }

/* 3. Layout */
.ds-root .dashboard-container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: var(--space-xl) var(--space-lg);
}
.ds-root .dashboard-header { margin-bottom: var(--space-xl); }
.ds-root .dashboard-title {
  font-size: var(--fs-title);
  font-weight: var(--fw-title, var(--font-heading-weight));
  color: var(--color-text);
  margin-bottom: var(--space-xs);
  letter-spacing: -0.01em;
}
.ds-root .dashboard-subtitle {
  font-size: var(--fs-subtitle);
  color: var(--color-muted);
}
.ds-root .section { margin-bottom: var(--space-xl); }
.ds-root .grid { display: grid; gap: var(--sp-grid-gap, var(--space-lg)); }
.ds-root .grid-2 { grid-template-columns: repeat(2, 1fr); }
.ds-root .grid-3 { grid-template-columns: repeat(3, 1fr); }
.ds-root .grid-4 { grid-template-columns: repeat(4, 1fr); }

/* 4. Components */
.ds-root .card {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: var(--sp-card-padding, var(--space-lg));
  box-shadow: var(--shadow-card);
  backdrop-filter: var(--card-backdrop);
  -webkit-backdrop-filter: var(--card-backdrop);
  position: relative;
  overflow: hidden;   /* 讓漸層條/裝飾跟隨圓角 */
  
  
}

.ds-root .card-title {
  font-size: var(--fs-card-title);
  font-weight: var(--fw-card-title, var(--font-heading-weight));
  font-family: var(--font-heading-family);
  color: var(--color-text);
  margin-bottom: var(--space-md);
}

/* KPI */
.ds-root .kpi-card { display: flex; flex-direction: column; gap: var(--space-xs); }
.ds-root .kpi-label {
  font-size: var(--fs-kpi-label);
  color: var(--color-muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.ds-root .kpi-value {
  font-size: var(--fs-kpi-value);
  font-weight: var(--fw-kpi-value, 700);
  color: var(--co-kpi-value, var(--color-text));
  line-height: 1.1;
  letter-spacing: -0.02em;
}
.ds-root .kpi-note {
  font-size: var(--fs-kpi-unit);
  color: var(--color-muted);
  font-weight: 500;
  margin-left: 4px;
}
.ds-root .kpi-trend {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-sm);
}
.ds-root .kpi-delta { font-size: var(--fs-kpi-delta); }
.ds-root .kpi-spark { display: inline-block; width: 80px; height: 24px; }

/* Chart */
.ds-root .chart-box {
  height: 220px;
  border-radius: calc(var(--radius) / 1.5);
  background: color-mix(in srgb, var(--color-main) 8%, var(--color-card));
  padding: var(--space-md);
  position: relative;
  font-size: var(--fs-chart-text);
}
.ds-root .chart-box svg { width: 100%; height: 100%; display: block; }
.ds-root .chart-legend {
  display: flex;
  gap: var(--space-md);
  flex-wrap: wrap;
  margin-top: var(--space-sm);
  font-size: var(--fs-chart-legend);
  color: var(--color-muted);
}
.ds-root .chart-legend span { display: inline-flex; align-items: center; gap: 6px; }
.ds-root .chart-legend i { display: inline-block; width: 12px; height: 12px; border-radius: 3px; }
.ds-root .chart-legend .legend-bar { background: var(--color-chart); }
.ds-root .chart-legend .legend-line {
  width: 16px; height: 2px;
  background: var(--color-warning); border-radius: 2px;
}

/* Table */
.ds-root .data-table { font-size: var(--fs-table-body); }
.ds-root .data-table th,
.ds-root .data-table td {
  padding: var(--row-pad) var(--space-md);
  border-bottom: 1px solid var(--color-border);
  text-align: left;
}
.ds-root .data-table tbody td { font-weight: var(--fw-table-body, 400); }
.ds-root .data-table th {
  font-size: var(--fs-table-head);
  color: var(--color-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  background: color-mix(in srgb, var(--color-main) 6%, var(--color-card));
}
.ds-root .data-table tbody tr:hover { background: color-mix(in srgb, var(--color-main) 5%, transparent); }
.ds-root .data-table tbody tr:last-child td { border-bottom: none; }

/* Badge */
.ds-root .badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: var(--fs-chart-legend);
  font-weight: 600;
  margin-right: 4px;
  background: color-mix(in srgb, var(--co-badge, var(--color-chart)) 14%, transparent);
  color: var(--co-badge, var(--color-chart));
  border: 1px solid transparent;
}
.ds-root .badge-primary  { background: color-mix(in srgb, var(--color-chart) 14%, transparent); color: var(--color-chart); }
.ds-root .badge-positive { background: color-mix(in srgb, var(--color-positive) 15%, transparent); color: var(--color-positive); }
.ds-root .badge-negative { background: color-mix(in srgb, var(--color-negative) 15%, transparent); color: var(--color-negative); }
.ds-root .badge-warning  { background: color-mix(in srgb, var(--color-warning) 18%, transparent); color: var(--color-warning); }

/* Buttons */
.ds-root .button-primary {
  display: inline-block;
  background: var(--co-button-primary, var(--color-main)); color: #fff;
  border: none;
  border-radius: calc(var(--radius) / 2);
  padding: var(--space-sm) var(--space-lg);
  font-size: var(--fs-base);
  font-weight: 600;
  cursor: pointer;
  transition: filter 0.15s, transform 0.1s;
  margin-right: var(--space-sm);
}
.ds-root .button-primary:hover { filter: brightness(0.92); }
.ds-root .button-primary:active { transform: translateY(1px); }
.ds-root .button-secondary {
  display: inline-block;
  background: var(--color-card);
  color: var(--color-text);
  border: 1px solid var(--color-border);
  border-radius: calc(var(--radius) / 2);
  padding: var(--space-sm) var(--space-lg);
  font-size: var(--fs-base);
  font-weight: 600;
  cursor: pointer;
}
.ds-root .button-secondary:hover { background: color-mix(in srgb, var(--color-main) 8%, var(--color-card)); }

/* Multi-checkbox season selector */
.multi-check-row {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
}
.season-check-label {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
  border: 2px solid var(--color-border); background: white;
  cursor: pointer; transition: all 0.15s; color: var(--color-muted);
  user-select: none;
}
.season-check-label input[type=checkbox] { display: none; }
.season-check-label.chk-25s.checked  { background: #fde68a; border-color: #f59e0b; color: #92400e; }
.season-check-label.chk-26sp.checked { background: #bfdbfe; border-color: #3b82f6; color: #1e3a8a; }
.season-check-label.chk-26s.checked  { background: #bbf7d0; border-color: #16a34a; color: #14532d; }
.season-check-label .check-dot {
  width: 10px; height: 10px; border-radius: 50%; border: 2px solid currentColor;
  transition: background 0.15s;
}
.season-check-label.checked .check-dot { background: currentColor; }

/* KPI horizontal bar chart card */
.kpi-bar-card {
  display: flex; flex-direction: column; gap: 10px;
}
.kpi-bar-row {
  display: flex; flex-direction: column; gap: 4px;
}
.kpi-bar-header {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 12px;
}
.kpi-bar-label { font-weight: 600; color: var(--color-text); }
.kpi-bar-value { font-weight: 700; color: var(--color-text); font-size: 13px; }
.kpi-bar-track {
  height: 20px; background: var(--color-border);
  border-radius: 4px; overflow: hidden;
}
.kpi-bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  display: flex; align-items: center; padding-left: 6px;
  font-size: 11px; font-weight: 700; color: rgba(0,0,0,0.55); white-space: nowrap;
}

/* Target mode toggle */
.target-mode-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
}
.target-mode-label {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 18px; border-radius: 999px; font-size: 13px; font-weight: 600;
  border: 2px solid var(--color-border); background: white;
  cursor: pointer; transition: all 0.15s; color: var(--color-muted); user-select: none;
}
.target-mode-label input { display: none; }
.target-mode-label.mode-base.active   { background: #dbeafe; border-color: #3b82f6; color: #1e40af; }
.target-mode-label.mode-all.active    { background: #dcfce7; border-color: #16a34a; color: #14532d; }

/* Venue checkbox group */
.venue-check-grid {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.venue-check-label {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 13px; border-radius: 8px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--color-border); background: white;
  cursor: pointer; transition: all 0.15s; color: var(--color-muted); user-select: none;
}
.venue-check-label input[type=checkbox] { display: none; }
.venue-check-label.checked {
  background: var(--color-main-100); border-color: var(--color-main-500); color: var(--color-main-800);
}
.venue-metric-tabs {
  display: flex; gap: 4px; margin-bottom: 16px;
}
.venue-metric-btn {
  padding: 6px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--color-border); background: white; cursor: pointer;
  color: var(--color-muted); transition: all 0.15s;
}
.venue-metric-btn.active {
  background: var(--color-main-700); border-color: var(--color-main-700); color: white;
}

/* Insight / Risk */
.ds-root .insight-box {
  background: color-mix(in srgb, var(--color-main) 8%, var(--color-card));
  border-left: 4px solid var(--color-main);
  padding: var(--space-md) var(--space-lg);
  border-radius: calc(var(--radius) / 2);
  font-size: var(--fs-base);
  color: var(--color-text);
}
.ds-root .risk-box {
  background: color-mix(in srgb, var(--color-warning) 10%, var(--color-card));
  border-left: 4px solid var(--color-warning);
  padding: var(--space-md) var(--space-lg);
  border-radius: calc(var(--radius) / 2);
  font-size: var(--fs-base);
  color: var(--color-text);
}

/* 5. Utilities */
.ds-root .text-muted { color: var(--color-muted); }
.ds-root .text-positive { color: var(--color-positive); font-weight: 600; }
.ds-root .text-negative { color: var(--color-negative); font-weight: 600; }
.ds-root .text-right { text-align: right; }
.ds-root .mt-16 { margin-top: 16px; }
.ds-root .mt-24 { margin-top: 24px; }
.ds-root .mb-16 { margin-bottom: 16px; }

/* 6. Responsive */
@media (max-width: 960px) {
  .ds-root .grid-3,
  .ds-root .grid-4 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .ds-root .dashboard-container { padding: var(--space-lg) var(--space-md); }
  .ds-root .grid-2,
  .ds-root .grid-3,
  .ds-root .grid-4 { grid-template-columns: 1fr; }
  .ds-root .kpi-spark { width: 60px; }
  .ds-root .data-table th,
  .ds-root .data-table td {
    padding: var(--space-xs) var(--space-sm);
  }
}


/* ===== Additional Dashboard Styles ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--color-bg, #f0f9ff); font-family: 'Noto Sans TC', sans-serif; }

/* Lang toggle */
.lang-bar {
  display: flex; align-items: center; gap: 8px;
  position: fixed; top: 16px; right: 24px; z-index: 100;
  background: white; border: 1px solid var(--color-border);
  border-radius: 999px; padding: 4px 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.lang-btn {
  background: none; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; padding: 4px 10px;
  border-radius: 999px; color: var(--color-muted);
  transition: all 0.15s;
}
.lang-btn.active {
  background: var(--color-main-200); color: var(--color-main-800);
}

/* Tab nav */
.tab-nav {
  display: flex; gap: 4px;
  border-bottom: 2px solid var(--color-border);
  margin-bottom: 24px; overflow-x: auto;
}
.tab-btn {
  background: none; border: none; cursor: pointer;
  padding: 10px 20px; font-size: 14px; font-weight: 600;
  color: var(--color-muted); border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.15s; white-space: nowrap;
}
.tab-btn.active { color: var(--color-main-700); border-bottom-color: var(--color-main-600); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Season selector */
.season-pills {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.season-pill {
  padding: 6px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--color-border); background: white;
  cursor: pointer; transition: all 0.15s; color: var(--color-muted);
}
.season-pill.active-25s  { background: #fde68a; border-color: #f59e0b; color: #92400e; }
.season-pill.active-26sp { background: #bfdbfe; border-color: #3b82f6; color: #1e3a8a; }
.season-pill.active-26s  { background: #bbf7d0; border-color: #16a34a; color: #14532d; }

/* KPI grid */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
@media(max-width:900px){ .kpi-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:480px){ .kpi-grid { grid-template-columns: 1fr; } }

/* Chart container */
.chart-wrap { width: 100%; overflow-x: auto; }
canvas { max-width: 100%; }

/* Table scroll */
.table-wrap { overflow-x: auto; }

/* Special badge */
.special-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 999px; margin-left: 6px; font-weight: 600;
  background: #fef3c7; color: #92400e;
}

/* Progress bar */
.progress-wrap { margin: 4px 0; }
.progress-bar { height: 8px; border-radius: 4px; background: var(--color-border); overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

/* Import section */
.import-zone {
  border: 2px dashed var(--color-border); border-radius: 12px;
  padding: 32px; text-align: center; background: var(--color-card);
  cursor: pointer; transition: border-color 0.2s;
}
.import-zone:hover { border-color: var(--color-main-400); }
.import-zone input { display: none; }

/* Insight/alert */
.alert-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
.alert-item {
  flex: 1; min-width: 200px; padding: 12px 16px;
  border-radius: 8px; font-size: 13px; line-height: 1.5;
}
.alert-info { background: #e0f2fe; border-left: 3px solid #0284c7; color: #0c4a6e; }
.alert-warn { background: #fef9c3; border-left: 3px solid #ca8a04; color: #713f12; }
.alert-danger { background: #fee2e2; border-left: 3px solid #dc2626; color: #7f1d1d; }

/* Export btn group */
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

/* Header accent */
.dashboard-header {
  background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 60%, #dcfce7 100%);
  border-radius: 12px; padding: 24px 28px; margin-bottom: 24px;
  border: 1px solid var(--color-border);
}
.season-tag {
  display: inline-block; font-size: 12px; font-weight: 700;
  padding: 3px 10px; border-radius: 6px; margin-right: 8px;
}
.tag-25s  { background: #fde68a; color: #78350f; }
.tag-26sp { background: #bfdbfe; color: #1e40af; }
.tag-26s  { background: #bbf7d0; color: #14532d; }

  document.getElementById('btn-zh').className = 'lang-btn' + (lang==='zh'?' active':'');
  document.getElementById('btn-ja').className = 'lang-btn' + (lang==='ja'?' active':'');

  });

  renderAll();
}

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const btns = document.querySelectorAll('.tab-btn');
  const tabs = ['overview','target','velocity','venue','ticket','show'];
  btns[tabs.indexOf(name)].classList.add('active');
  setTimeout(() => {
    if(name==='overview') renderOverview();
    if(name==='target') renderTarget();
    if(name==='velocity') renderVelocity();
    if(name==='venue') renderVenue();
    if(name==='ticket') renderTicketMix();
    if(name==='show') renderShowDetail('fy26s');
  }, 50);
}

  checks.innerHTML = defs.map(d => `
    <label class="season-check-label ${d.cls} ${kpiSeasonChecks[d.key]?'checked':''}"
      onclick="toggleKpiSeason('${d.key}')">
      <span class="check-dot"></span>
      ${t(d.zh,d.ja)}
    </label>
  `).join('');
}

function toggleKpiSeason(key) {
  // 至少保留一個
  const checkedCount = Object.values(kpiSeasonChecks).filter(Boolean).length;
  if(kpiSeasonChecks[key] && checkedCount===1) return;
  kpiSeasonChecks[key] = !kpiSeasonChecks[key];
  renderKpiChecks();
  renderOverview();
}

function renderOverview() {
  const allSeasons = [
    { key:'fy25s',  data: RAW_DATA.fy25s,  color: SEASON_COLORS.fy25s },
    { key:'fy26sp', data: RAW_DATA.fy26sp, color: SEASON_COLORS.fy26sp },
    { key:'fy26s',  data: fy26sData,        color: SEASON_COLORS.fy26s },
  ];
  const seasons = allSeasons.filter(s => kpiSeasonChecks[s.key]);
  const colors  = seasons.map(s => s.color);

  renderKpiChecks();

  // KPI Cards — horizontal bar charts
  const grid = document.getElementById('kpiGrid');
  const kpis = [
    { key:'tickets', zh:'總售票張數',   ja:'総販売枚数',   fmt: v=>fmtNum(v)+t('張','枚') },
    { key:'revenue', zh:'總票房營業額', ja:'総興行収入',   fmt: v=>'NT$'+Math.round(v/10000)+'萬' },
    { key:'avgPrice',zh:'平均票價',     ja:'平均単価',     fmt: v=>'NT$'+fmtNum(v) },
    { key:'venues',  zh:'巡迴場地數',   ja:'巡回会場数',   fmt: v=>v+t('場','会場') },
  ];
  grid.innerHTML = '';
  kpis.forEach(kpi => {
    const vals = seasons.map(s => s.data.kpi[kpi.key]);
    const maxVal = Math.max(...vals, 1);
    const card = document.createElement('div');
    card.className = 'card kpi-bar-card';
    card.innerHTML = `
      <div class="kpi-label" style="margin-bottom:4px;">${t(kpi.zh,kpi.ja)}</div>
      ${seasons.map((s,i) => {
        const val = s.data.kpi[kpi.key];
        const pctW = Math.round(val/maxVal*100);
        return `<div class="kpi-bar-row">
          <div class="kpi-bar-header">
            <span class="kpi-bar-label" style="color:${colors[i].border};">${t(s.data.label,s.data.labelJa)}</span>
            <span class="kpi-bar-value">${kpi.fmt(val)}</span>
          </div>
          <div class="kpi-bar-track">
            <div class="kpi-bar-fill" style="width:${pctW}%; background:${colors[i].bg}; border:1px solid ${colors[i].border};">${pctW===100?'▶':''}</div>
          </div>
        </div>`;
      }).join('')}
    `;
    grid.appendChild(card);
  });

  // Insight row — 動態依實際資料天數計算
  const ir = document.getElementById('insightRow');
  // 26夏實際有資料的最後一天
  const v26sLen  = fy26sData.velocity.filter(d=>d[0]>0).length;
  const actualDays26s = fy26sData.velocity.length; // 已有幾天（含0量天）
  const lastIdx  = fy26sData.velocity.length - 1;
  const cumLast26s  = lastIdx >= 0 ? fy26sData.velocity[lastIdx][2] : 0;
  const dayLabel = fy26sData.velocity.length; // 開賣後第幾天
  // 同期比較（相同天數）
  const sameIdx = Math.min(dayLabel-1, RAW_DATA.fy25s.velocity.length-1);
  const cum25s_same  = sameIdx>=0 ? RAW_DATA.fy25s.velocity[sameIdx][2] : 0;
  const cum26sp_same = sameIdx>=0 ? RAW_DATA.fy26sp.velocity[sameIdx][2] : 0;
  const ratio25  = cum25s_same>0  ? (cumLast26s/cum25s_same*100).toFixed(0)  : '-';
  const ratio26sp= cum26sp_same>0 ? (cumLast26s/cum26sp_same*100).toFixed(0) : '-';
  const earlyPct = (fy26sData.kpi.earlyTickets / fy26sData.kpi.tickets * 100).toFixed(1);
  ir.innerHTML = `
    <div class="alert-item alert-info">
      📌 ${t(`FY26夏開賣後第${dayLabel}天累積：`,`FY26夏 販売開始${dayLabel}日間累積：`)}<b>${fmtNum(cumLast26s)}${t('張','枚')}</b>
      ${t('，同期（25夏）','（FY25夏同期比')} <b>${ratio25}%</b>
      ${t('，同期（26春）','，FY26春同期比')} <b>${ratio26sp}%</b>
    </div>
    <div class="alert-item alert-warn">
      ⚡ ${t('快閃折扣佔','フラッシュ割引占比')}<b>${fy26sData.ticketMix.find(x=>x.cat==='快閃折扣')?.pct||0}%</b>，
      ${t('原價票僅','定価チケット')}<b>${fy26sData.ticketMix.find(x=>x.cat==='原價')?.pct||0}%</b>
      ${t('，促銷依賴度持續攀升','，販促依存傾向に注意')}
    </div>
    <div class="alert-item alert-info">
      🎁 ${t('含提前票','首日前先行販売')}<b>${fmtNum(fy26sData.kpi.earlyTickets)}</b>${t('張（佔','枚（全体の')}<b>${earlyPct}%</b>${t('）','）')}
    </div>
  `;

}

let currentTargetMode = 'base'; // 'base' | 'all'

function setTargetMode(mode) {
  currentTargetMode = mode;
  // 更新字卡 active 樣式
  document.querySelectorAll('.target-mode-label').forEach(el => {
    el.classList.toggle('active', el.querySelector('input').value === mode);
  });
  // 更新說明文字
  const note = document.getElementById('targetModeNote');
  if(note) {
    const zhKey = mode==='base' ? 'data-zh-base' : 'data-zh-all';
    const jaKey = mode==='base' ? 'data-ja-base' : 'data-ja-all';
    note.textContent = currentLang==='zh' ? note.getAttribute(zhKey) : note.getAttribute(jaKey);
  }
  renderTarget();
}

function renderTarget() {
  const data = fy26sData;
  
  // Compute actuals per target venue
  const venueMap = {};
  data.venueSummary.forEach(v => { venueMap[v.venue] = v; });
  // 臺北市政大樓親子劇場 有6月和8月兩組目標，需要分場次加總
  // 用showDetail區分
  const showByVenue = {};
  (data.showDetail||[]).forEach(s => {
    const k = s.venue;
    if(!showByVenue[k]) showByVenue[k] = {tickets:0, revenue:0};
    showByVenue[k].tickets += s.tickets;
    showByVenue[k].revenue += s.revenue;
  });
  
  // For target rows, match actual from venueMap (simple)
  // 臺北 6月場次 = 2026/06/xx, 8月 = 2026/08/xx
  const showByMonth = {};
  (data.showDetail||[]).forEach(s => {
    const m = s.showTime.includes('/06/') ? '6月' : s.showTime.includes('/07/') ? '7月' : s.showTime.includes('/08/') ? '8月' : '9月+';
    const k = s.venue+'|'+m;
    if(!showByMonth[k]) showByMonth[k] = {tickets:0, revenue:0};
    showByMonth[k].tickets += s.tickets;
    showByMonth[k].revenue += s.revenue;
  });

  const targets = data.targets || [];
  const rows = targets.map(tgt => {
    const k = (tgt.venueTag ? tgt.venue : tgt.venue) +'|'+ tgt.month;
    const actual = showByMonth[k] || {tickets:0, revenue:0};
    const achRate = tgt.targetRev > 0 ? actual.revenue / tgt.targetRev : null;
    return { ...tgt, actualTickets: actual.tickets, actualRev: actual.revenue, achRate };
  });
  
  const totalTargetRev = rows.reduce((s,r)=>s+r.targetRev,0);
  const baseActualRev  = rows.reduce((s,r)=>s+r.actualRev,0);

  // 特殊場次實績
  const specialRev = (data.special||[]).reduce((s,x)=>s+x.revenue,0);
  const specialTickets = (data.special||[]).reduce((s,x)=>s+x.tickets,0);

  const isAll = currentTargetMode === 'all';
  const totalActualRev  = isAll ? baseActualRev + specialRev : baseActualRev;
  const totalActualTix  = isAll ? rows.reduce((s,r)=>s+r.actualTickets,0)+specialTickets : rows.reduce((s,r)=>s+r.actualTickets,0);
  const totalAch = totalActualRev / totalTargetRev;

  // Summary card
  const sc = document.getElementById('targetSummaryCard');
  const achColor = totalAch>=0.8?'#16a34a':totalAch>=0.5?'#ca8a04':'#dc2626';
  sc.innerHTML = `
    <div style="display:flex; gap:20px; flex-wrap:wrap; align-items:stretch;">
      <div style="flex:1; min-width:120px;">
        <div class="kpi-label">${t('期初目標票房','期初目標収入')}</div>
        <div class="kpi-value" style="font-size:24px;">NT$${Math.round(totalTargetRev/10000).toLocaleString()}萬</div>
      </div>
      <div style="flex:1; min-width:120px;">
        <div class="kpi-label">${t('現況實績票房','実績収入')}</div>
        <div class="kpi-value" style="font-size:24px; color:var(--color-main-700);">NT$${Math.round(totalActualRev/10000).toLocaleString()}萬</div>
        ${isAll ? `<div style="font-size:11px; color:#16a34a; margin-top:2px;">＋特殊場 NT$${Math.round(specialRev/10000)}萬</div>` : ''}
      </div>
      <div style="flex:1; min-width:120px;">
        <div class="kpi-label">${isAll ? t('整體達成率（含特殊場次）','全体達成率（特殊公演含む）') : t('達成率（期初目標場次）','達成率（期初目標会場）')}</div>
        <div class="kpi-value" style="font-size:28px; color:${achColor};">${(totalAch*100).toFixed(1)}%</div>
      </div>
      <div style="flex:1; min-width:120px;">
        <div class="kpi-label">${t('缺口金額','差額')}</div>
        <div class="kpi-value" style="font-size:24px; color:#dc2626;">NT$${Math.round((totalTargetRev-totalActualRev)/10000).toLocaleString()}萬</div>
      </div>
    </div>
  `;

  // 圖表資料：base模式只顯示8場地；all模式額外加3特殊場
  let chartRows = [...rows];
  if(isAll) {
    (data.special||[]).forEach(sp => {
      chartRows.push({
        venue: sp.venue, month:'特殊',
        targetQty:0, targetRev:0,
        actualTickets: sp.tickets, actualRev: sp.revenue,
        achRate: null, isSpecial: true
      });
    });
  }

  destroyChart('targetChart');
  charts['targetChart'] = new Chart(document.getElementById('targetChart'), {
    type:'bar',
    data:{
      labels: chartRows.map(r => {
        const name = r.venue.length>14 ? r.venue.substring(0,14)+'…' : r.venue;
        return r.isSpecial ? name+' ★' : name;
      }),
      datasets:[
        {
          label: t('目標票房','目標収入'),
          data: chartRows.map(r=>r.targetRev),
          backgroundColor: chartRows.map(r=>r.isSpecial?'transparent':'rgba(203,213,225,0.6)'),
          borderColor: chartRows.map(r=>r.isSpecial?'transparent':'#94a3b8'),
          borderWidth:1, borderRadius:4
        },
        {
          label: t('實績票房','実績収入'),
          data: chartRows.map(r=>r.actualRev),
          backgroundColor: chartRows.map(r=>r.isSpecial?'rgba(251,191,36,0.7)':'rgba(34,197,94,0.7)'),
          borderColor: chartRows.map(r=>r.isSpecial?'#f59e0b':'#16a34a'),
          borderWidth:1, borderRadius:4
        },
      ]
    },
    options:{
      indexAxis:'y',
      plugins:{
        legend:{ position:'top' },
        tooltip:{ callbacks:{ label: ctx => ctx.dataset.label+': NT$'+Math.round(ctx.parsed.x/10000)+'萬' } },
        customDiffLabel: {}
      },
      scales:{ x:{ ticks:{ callback:v=>'$'+Math.round(v/10000)+'萬' } } }
    },
    plugins:[{
      id:'customDiffLabel',
      afterDatasetsDraw(chart) {
        const ctx2 = chart.ctx;
        const meta0 = chart.getDatasetMeta(0); // 目標
        const meta1 = chart.getDatasetMeta(1); // 實績
        if(!meta1.visible) return;
        ctx2.save();
        ctx2.font = 'bold 10px Inter, sans-serif';
        ctx2.textAlign = 'left';
        ctx2.textBaseline = 'middle';
        meta1.data.forEach((bar, i) => {
          const targetVal = chart.data.datasets[0].data[i] || 0;
          const actualVal = chart.data.datasets[1].data[i] || 0;
          if(targetVal === 0) return;
          const diff = actualVal - targetVal;
          const diffWan = Math.round(diff/10000);
          const label = (diff >= 0 ? '+' : '') + diffWan + '萬';
          const color = diff >= 0 ? '#16a34a' : '#dc2626';
          const x = bar.x + 4;
          const y = bar.y;
          ctx2.fillStyle = color;
          ctx2.fillText(label, x, y);
        });
        ctx2.restore();
      }
    }]
  });

  // Table
  const tbl = document.getElementById('targetTable');
  tbl.innerHTML = `<thead><tr>
    <th>${t('月份','月')}</th><th>${t('場地','会場')}</th>
    <th class="text-right">${t('目標張數','目標枚数')}</th><th class="text-right">${t('目標票房','目標収入')}</th>
    <th class="text-right">${t('實績張數','実績枚数')}</th><th class="text-right">${t('實績票房','実績収入')}</th>
    <th class="text-right">${t('達成率','達成率')}</th>
  </tr></thead><tbody>
  ${rows.map(r => `<tr>
    <td>${r.month}</td>
    <td>${r.venue}${r.venueTag?`<span class="special-badge">${r.venueTag}</span>`:''}</td>
    <td class="text-right">${Math.round(r.targetQty).toLocaleString()}</td>
    <td class="text-right">${Math.round(r.targetRev).toLocaleString()}</td>
    <td class="text-right">${r.actualTickets.toLocaleString()}</td>
    <td class="text-right">${r.actualRev.toLocaleString()}</td>
    <td class="text-right" style="font-weight:700; color:${r.achRate>=0.8?'#16a34a':r.achRate>=0.5?'#ca8a04':'#dc2626'}">${r.achRate!=null?(r.achRate*100).toFixed(1)+'%':'-'}</td>
  </tr>`).join('')}
  </tbody>`;

  // Special table
  const sp = document.getElementById('specialTable');
  sp.innerHTML = `<thead><tr>
    <th>${t('月份','月')}</th>
    <th>${t('場地','会場')}</th>
    <th>${t('類型','種別')}</th>
    <th class="text-right">${t('張數','枚数')}</th>
    <th class="text-right">${t('票房','収入')}</th>
  </tr></thead><tbody>
  ${(data.special||[]).map(s=>`<tr>
    <td style="font-weight:700; color:var(--color-main-700); white-space:nowrap;">${s.month||'—'}</td>
    <td>${s.venue}</td>
    <td><span class="special-badge">${t(s.note,s.noteJa)}</span></td>
    <td class="text-right">${s.tickets.toLocaleString()}</td>
    <td class="text-right">NT$${s.revenue.toLocaleString()}</td>
  </tr>`).join('')}
  </tbody>`;
}

// KPI season checks state
let kpiSeasonChecks = { fy25s: true, fy26sp: true, fy26s: true };

// Venue cross-season state
let currentVenueMetric = 'revenue';
let selectedVenues = new Set();
// ── venue helpers ──────────────────────────────────────────
function getSeasonData(key) {
  return key==='fy25s' ? RAW_DATA.fy25s : key==='fy26sp' ? RAW_DATA.fy26sp : fy26sData;
}

function getAllVenues() {
  const set = new Set();
  ['fy25s','fy26sp','fy26s'].forEach(k => {
    getSeasonData(k).venueSummary.forEach(v => set.add(v.venue));
  });
  return [...set].sort();
}

function setVenueMetric(metric) {
  currentVenueMetric = metric;
  document.querySelectorAll('.venue-metric-btn').forEach((btn, i) => {
    const metrics = ['revenue','tickets','avgPrice'];
    btn.classList.toggle('active', metrics[i]===metric);
  });
  renderVenueChart();
}

function toggleVenue(venue) {
  if(selectedVenues.has(venue)) {
    if(selectedVenues.size===1) return;
    selectedVenues.delete(venue);
  } else {
    selectedVenues.add(venue);
  }
  renderVenueChecks();
  renderVenueChart();
}

function renderVenueChecks() {
  const grid = document.getElementById('venueCheckGrid');
  if(!grid) return;
  const all = getAllVenues();
  const countEl = document.getElementById('venueCheckCount');
  if(countEl) countEl.textContent = t(`已選 ${selectedVenues.size} / ${all.length} 個場地`, `${selectedVenues.size} / ${all.length} 会場選択中`);
  grid.innerHTML = all.map(v => {
    const safe = v.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<label class="venue-check-label ${selectedVenues.has(v)?'checked':''}"
      onclick="toggleVenue('${safe}')" title="${v}">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;${selectedVenues.has(v)?'background:currentColor':''}"></span>
      ${v.length>12 ? v.substring(0,12)+'\u2026' : v}
    </label>`;
  }).join('');
}

function renderVenueChart() {
  const venueList = [...selectedVenues];
  const metricLabels = {
    revenue:  { zh:'票房營業額', ja:'興行収入', fmt: v=>'NT$'+Math.round(v/10000)+'萬', axisfmt: v=>'$'+Math.round(v/10000)+'萬' },
    tickets:  { zh:'售票張數',   ja:'販売枚数', fmt: v=>fmtNum(v),                      axisfmt: v=>v.toLocaleString() },
    avgPrice: { zh:'平均票價',   ja:'平均単価', fmt: v=>'NT$'+fmtNum(v),                axisfmt: v=>'$'+v },
  };
  const ml = metricLabels[currentVenueMetric];
  const seasonKeys = ['fy25s','fy26sp','fy26s'];
  const datasets = seasonKeys.map(k => {
    const sc = SEASON_COLORS[k];
    const sd = getSeasonData(k);
    return {
      label: t(sd.label, sd.labelJa),
      data: venueList.map(v => {
        const found = sd.venueSummary.find(x=>x.venue===v);
        return found ? found[currentVenueMetric] : 0;
      }),
      backgroundColor: sc.bg,
      borderColor: sc.border,
      borderWidth: 1.5,
      borderRadius: 5,
    };
  });
  const shortLabels = venueList.map(v => v.length>10 ? v.substring(0,10)+'\u2026' : v);
  destroyChart('venueChart');
  charts['venueChart'] = new Chart(document.getElementById('venueChart'), {
    type: 'bar',
    data: { labels: shortLabels, datasets },
    options: {
      plugins: { legend: { position:'top' }, tooltip: {
        callbacks: { label: ctx => ctx.dataset.label+': '+ml.fmt(ctx.parsed.y) }
      }},
      scales: { y: { ticks: { callback: ml.axisfmt } } }
    }
  });
  const leg = document.getElementById('venueLegend');
  if(leg) leg.innerHTML = seasonKeys.map(k => {
    const sc = SEASON_COLORS[k]; const sd = getSeasonData(k);
    return `<span><i style="background:${sc.border}; width:14px; height:14px; border-radius:3px; display:inline-block;"></i> ${t(sd.label,sd.labelJa)}</span>`;
  }).join('');
}

function renderVenueTableFn(venueList, ml) {
  const tbl = document.getElementById('venueTable');
  const seasonKeys = ['fy25s','fy26sp','fy26s'];
  const headerCols = seasonKeys.map(k => { const sd=getSeasonData(k); return t(sd.label,sd.labelJa); });
  tbl.innerHTML = '<thead><tr><th>'+t('場地','会場')+'</th>'+
    headerCols.map(h=>'<th class="text-right">'+h+'</th>').join('')+
    '</tr></thead><tbody>'+
    venueList.map(v => {
      const cells = seasonKeys.map(k => {
        const sd = getSeasonData(k);
        const found = sd.venueSummary.find(x=>x.venue===v);
        return found ? ml.fmt(found[currentVenueMetric]) : '<span style="color:var(--color-muted)">\u2014</span>';
      });
      return '<tr><td style="font-weight:500;">'+v+'</td>'+cells.map(c=>'<td class="text-right">'+c+'</td>').join('')+'</tr>';
    }).join('')+
    '</tbody>';
}

function selectAllVenues() {
  getAllVenues().forEach(v => selectedVenues.add(v));
  renderVenueChecks();
  renderVenueChart();
}

function clearAllVenues() {
  const all = getAllVenues();
  // 清除後至少留第一個
  selectedVenues.clear();
  if(all.length > 0) selectedVenues.add(all[0]);
  renderVenueChecks();
  renderVenueChart();
}

function renderVenue() {
  if(selectedVenues.size===0) {
    const common = getAllVenues().filter(v => {
      const cnt = ['fy25s','fy26sp','fy26s'].filter(k => getSeasonData(k).venueSummary.find(x=>x.venue===v)).length;
      return cnt >= 2;
    });
    (common.length > 0 ? common : getAllVenues().slice(0,3)).forEach(v => selectedVenues.add(v));
  }
  renderVenueChecks();
  renderVenueChart();
}

function renderTicketMix() {
  const cats    = TICKET_CATS_ZH;
  const catShort = ['快閃','粉絲','銀行','原價','折扣','團購','身障','其他'];
  const catShortJa = ['FL','Fan','Bank','定価','割引','団体','障害','他'];
  const xLabels = currentLang==='zh' ? catShort : catShortJa;
  const fullLabels = currentLang==='zh' ? cats : TICKET_CATS_JA;

  // 三回資料定義
  const rounds = [
    { id:'ticketChart25s',  roundLabel:'FY25夏', data: RAW_DATA.fy25s.ticketMix,  totalTix: RAW_DATA.fy25s.kpi.tickets },
    { id:'ticketChart26sp', roundLabel:'FY26春', data: RAW_DATA.fy26sp.ticketMix, totalTix: RAW_DATA.fy26sp.kpi.tickets },
    { id:'ticketChart26s',  roundLabel:'FY26夏', data: fy26sData.ticketMix,        totalTix: fy26sData.kpi.tickets },
  ];

  // 每回建一個 Chart.js 直條圖
  rounds.forEach(rd => {
    const chartData = cats.map(c => {
      const found = rd.data.find(x=>x.cat===c);
      return found ? found.pct : 0;
    });
    const cntData = cats.map(c => {
      const found = rd.data.find(x=>x.cat===c);
      return found ? found.cnt : 0;
    });

    destroyChart(rd.id);
    charts[rd.id] = new Chart(document.getElementById(rd.id), {
      type: 'bar',
      data: {
        labels: xLabels,
        datasets: [{
          data: chartData,
          backgroundColor: TICKET_CAT_COLORS.map(c => c+'bb'),
          borderColor:     TICKET_CAT_COLORS,
          borderWidth: 1.5,
          borderRadius: 4,
        }]
      },
      options: {
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: (items) => fullLabels[items[0].dataIndex],
              label: (ctx) => {
                const idx = ctx.dataIndex;
                const pctVal = ctx.parsed.y.toFixed(1);
                const cntVal = cntData[idx].toLocaleString();
                return [
                  t(`佔比：${pctVal}%`, `比率：${pctVal}%`),
                  t(`張數：${cntVal}張`, `枚数：${cntVal}枚`),
                ];
              }
            }
          }
        },
        scales: {
          x: { ticks: { font: { size: 10 } } },
          y: {
            ticks: { callback: v => v + '%', font: { size: 10 } },
            max: Math.ceil(Math.max(...chartData, 10) / 10) * 10
          }
        }
      }
    });
  });

  // 票種圖例
  const legEl = document.getElementById('ticketLegend');
  if(legEl) {
    legEl.innerHTML = cats.map((c,ci) => {
      const label = currentLang==='zh' ? c : TICKET_CATS_JA[ci];
      return `<span style="display:inline-flex;align-items:center;gap:5px;">
        <i style="display:inline-block;width:12px;height:12px;border-radius:2px;background:${TICKET_CAT_COLORS[ci]};"></i>${label}
      </span>`;
    }).join('');
  }

  // Insights（保留洞察卡片）
  const ti = document.getElementById('ticketInsights');
  const flash25   = RAW_DATA.fy25s.ticketMix.find(x=>x.cat==='快閃折扣')?.pct||0;
  const flash26sp = RAW_DATA.fy26sp.ticketMix.find(x=>x.cat==='快閃折扣')?.pct||0;
  const flash26s  = fy26sData.ticketMix.find(x=>x.cat==='快閃折扣')?.pct||0;
  const bank25s   = RAW_DATA.fy25s.ticketMix.find(x=>x.cat==='銀行信用卡')?.pct||0;
  const bank26s   = fy26sData.ticketMix.find(x=>x.cat==='銀行信用卡')?.pct||0;
  ti.innerHTML = `
    <div class="alert-item alert-${flash26s>50?'danger':'warn'}">
      ⚡ ${t('快閃折扣趨勢：','フラッシュ割引推移：')}
      FY25夏 <b>${flash25}%</b> → FY26春 <b>${flash26sp}%</b> → FY26夏 <b>${flash26s}%</b>
    </div>
    <div class="alert-item alert-warn">
      🏦 ${t('銀行信用卡：FY25夏','銀行クレジット：FY25夏')} <b>${bank25s}%</b> → FY26夏 <b>${bank26s}%</b>
    </div>
  `;
}

  // 月份色塊設定
  const MONTH_COLORS = [

    {bg:'#fce7f3', border:'#f9a8d4', text:'#831843'},  // 2月
    {bg:'#ffe4e6', border:'#fca5a5', text:'#7f1d1d'},  // 3月
    {bg:'#ffedd5', border:'#fdba74', text:'#7c2d12'},  // 4月
    {bg:'#dcfce7', border:'#86efac', text:'#14532d'},  // 5月
    {bg:'#dbeafe', border:'#93c5fd', text:'#1e3a8a'},  // 6月
    {bg:'#e0e7ff', border:'#a5b4fc', text:'#312e81'},  // 7月
    {bg:'#fae8ff', border:'#e879f9', text:'#701a75'},  // 8月
    {bg:'#f0fdf4', border:'#4ade80', text:'#14532d'},  // 9月
    {bg:'#fff7ed', border:'#fb923c', text:'#7c2d12'},  // 10月
    {bg:'#f1f5f9', border:'#94a3b8', text:'#1e293b'},  // 11月
    {bg:'#f8fafc', border:'#cbd5e1', text:'#334155'},  // 12月
  ];

  function getMonthFromShowTime(showTime) {

  // 建月份 → 色塊 map（依出現順序分配顏色）

  const tbl = document.getElementById('showTable');
  tbl.innerHTML = `<thead><tr>

    <th class="text-right">${t('售票張數','販売枚数')}</th>
    <th class="text-right">${t('票房','収入')}</th>
    <th class="text-right">${t('平均票價','平均単価')}</th>
  </tr></thead><tbody>
  ${rows.map(r => {
    const m = getMonthFromShowTime(r.showTime);
    const colorIdx = monthOrder.indexOf(m) % MONTH_COLORS.length;
    const mc = MONTH_COLORS[colorIdx];
    return `<tr style="background:${mc.bg};">

      <td>${r.venue}</td>

      <td class="text-right">NT$${fmtNum(r.avgPrice)}</td>
    </tr>`;
  }).join('')}
  </tbody>`;

  // 月份圖例
  const legEl = document.getElementById('showMonthLegend');
  if(legEl) {
    legEl.innerHTML = monthOrder.map((m,i) => {
      const mc = MONTH_COLORS[i % MONTH_COLORS.length];
      return `<span style="display:inline-flex;align-items:center;gap:4px;">
        <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:${mc.bg};border:2px solid ${mc.border};"></span>
        ${(m+1)}${t('月','月')}
      </span>`;
    }).join('');
  }
}

// ============================================================
// IMPORT XLSX
// ============================================================
function handleXlsxImport(event) {
  const file = event.target.files[0];
  if(!file) return;
  const status = document.getElementById('importStatus');
  status.textContent = t('讀取中…','読み込み中…');
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const sheetName = '2026年夏季';
      if(!wb.SheetNames.includes(sheetName)) {
        status.textContent = t('❌ 找不到「2026年夏季」工作表','❌「2026年夏季」シートが見つかりません');
        return;
      }
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
      
      // Parse rows (skip header rows 0-8)
      const data = [];
      const firstSaleDay = '2026-05-05';
      
      for(let i=9; i<rows.length; i++) {
        const r = rows[i];
        if(!r[0] || r[0]==='(場次)小計') continue;
        if(typeof r[0]==='string') continue;
        const sellPrice = r[11];
        if(!sellPrice || sellPrice===0) continue;
        
        let sellDate = '';
        if(r[0] instanceof Date) {
          sellDate = r[0].toISOString().substring(0,10);
        } else if(typeof r[0]==='number') {
          const d = XLSX.SSF.parse_date_code(r[0]);
          sellDate = d.y+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0');
        } else { continue; }
        
        data.push({
          sellDate, showTime: r[1]||'', venue: r[2]||'',
          price: parseFloat(sellPrice), ticketType: r[12]||''
        });
      }
      
      if(data.length === 0) {
        status.textContent = t('❌ 解析失敗，未讀取到有效資料','❌ 有効なデータが読み込めませんでした');
        return;
      }
      
      // Recompute
      const earlyTickets = data.filter(d=>d.sellDate < firstSaleDay).length;
      const fromFirstDay = data.filter(d=>d.sellDate >= firstSaleDay);
      const totalRev = data.reduce((s,d)=>s+d.price,0);
      const avgPrice = Math.round(totalRev/data.length);
      const venues = [...new Set(data.map(d=>d.venue))];
      
      // Velocity
      const dayMap = {};
      fromFirstDay.forEach(d => {
        const fd = new Date(firstSaleDay);
        const sd = new Date(d.sellDate);
        const n = Math.floor((sd-fd)/(86400000))+1;
        dayMap[n] = (dayMap[n]||0)+1;
      });
      const maxDay = Math.max(...Object.keys(dayMap).map(Number), 2);
      let cum=0, velocity=[];
      for(let dn=1;dn<=maxDay;dn++) { cum+=(dayMap[dn]||0); velocity.push([dn,dayMap[dn]||0,cum]); }
      
      // Venue summary
      const venueMap = {};
      data.forEach(d=>{ if(!venueMap[d.venue]) venueMap[d.venue]={tickets:0,revenue:0}; venueMap[d.venue].tickets++; venueMap[d.venue].revenue+=d.price; });
      const venueSummary = Object.entries(venueMap).map(([v,s])=>({venue:v,tickets:s.tickets,revenue:Math.round(s.revenue),avgPrice:Math.round(s.revenue/s.tickets)}));
      
      // Ticket mix
      const ticketCats = {
        '快閃折扣': d => d.ticketType.includes('快閃')||d.ticketType.includes('炫購'),
        '會員/粉絲專屬': d => d.ticketType.includes('粉絲')||d.ticketType.includes('好朋友')||d.ticketType.includes('社群')||d.ticketType.includes('VIP')||d.ticketType.includes('隊友'),
        '銀行信用卡': d => d.ticketType.includes('信用卡')||d.ticketType.includes('銀行'),
        '企業/團購': d => d.ticketType.includes('幼兒園')||d.ticketType.includes('台積電')||d.ticketType.includes('企業')||d.ticketType.includes('團購'),
        '原價': d => d.ticketType.includes('原價'),
        '無退換折扣票': d => d.ticketType.includes('8折')||d.ticketType.includes('85折')||d.ticketType.includes('7折'),
        '身障票': d => d.ticketType.includes('身心障礙')||d.ticketType.includes('身障')||d.ticketType.includes('輪椅'),
      };
      const catMap = {};
      data.forEach(d=>{
        let matched = false;
        for(const [cat,fn] of Object.entries(ticketCats)) { if(fn(d)){ catMap[cat]=(catMap[cat]||{cnt:0,rev:0}); catMap[cat].cnt++; catMap[cat].rev+=d.price; matched=true; break; } }
        if(!matched){ catMap['其他']=(catMap['其他']||{cnt:0,rev:0}); catMap['其他'].cnt++; catMap['其他'].rev+=d.price; }
      });
      const ticketMix = Object.entries(catMap).map(([cat,v])=>( {cat,cnt:v.cnt,rev:Math.round(v.rev),pct:parseFloat((v.cnt/data.length*100).toFixed(1))} )).sort((a,b)=>b.cnt-a.cnt);
      
      // Show detail
      const showMap = {};
      data.forEach(d=>{ const k=d.showTime+'||'+d.venue; if(!showMap[k]) showMap[k]={showTime:d.showTime,venue:d.venue,tickets:0,revenue:0}; showMap[k].tickets++; showMap[k].revenue+=d.price; });
      const showDetail = Object.values(showMap).map(s=>( {...s,revenue:Math.round(s.revenue),avgPrice:Math.round(s.revenue/s.tickets)} )).sort((a,b)=>a.showTime.localeCompare(b.showTime));
      
      // Update global
      fy26sData = {
        ...fy26sData,
        dataDate: data.reduce((a,b)=>a.sellDate>b.sellDate?a:b).sellDate,
        kpi: { tickets: data.length, revenue: Math.round(totalRev), avgPrice, venues: venues.length, earlyTickets },
        velocity, venueSummary, ticketMix, showDetail,
      };
      
      document.getElementById('dataDateDisplay').textContent = fy26sData.dataDate;
      status.textContent = t('✅ 匯入成功！共 ','✅ インポート完了！') + data.length + t(' 筆資料','件のデータ');
      renderAll();
    } catch(err) {
      status.textContent = t('❌ 解析錯誤：','❌ エラー：') + err.message;
      console.error(err);
    }
    event.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function exportHTML() {
  const clone = document.documentElement.outerHTML;
  const blob = new Blob([clone], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ticket_dashboard_' + new Date().toISOString().substring(0,10) + '.html';
  a.click(); URL.revokeObjectURL(url);
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  const active = document.querySelector('.tab-panel.active')?.id?.replace('tab-','');
  if(active==='overview') { renderKpiChecks(); renderOverview(); }
  else if(active==='target') renderTarget();
  else if(active==='velocity') renderVelocity();
  else if(active==='venue') renderVenue();
  else if(active==='ticket') renderTicketMix();
  else if(active==='show') renderShowDetail(currentShowSeason);
  
  // Update target mode note
  const note = document.getElementById('targetModeNote');
  if(note) {
    const zhKey = currentTargetMode==='base' ? 'data-zh-base' : 'data-zh-all';
    const jaKey = currentTargetMode==='base' ? 'data-ja-base' : 'data-ja-all';
    note.textContent = currentLang==='zh' ? note.getAttribute(zhKey) : note.getAttribute(jaKey);
  }
  // Update all data-zh/ja elements
  document.querySelectorAll('[data-zh]').forEach(el => {
    el.textContent = currentLang==='zh' ? el.dataset.zh : (el.dataset.ja || el.dataset.zh);
  });
  // Tab buttons
  const tabLabels = [
    [t('📊 總覽 KPI','📊 KPI概要'),t('🎯 目標達成（FY26夏）','🎯 目標達成（FY26夏）'),t('📈 開賣速度趨勢','📈 販売速度トレンド'),
     t('🏛 場地比較','🏛 会場比較'),t('🎟 票種結構','🎟 券種構成'),t('📋 場次明細','📋 公演明細')]
  ][0];
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{ btn.textContent = tabLabels[i]; });
}
